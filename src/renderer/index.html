<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snitch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="header-top">
          <h1>🐀 Snitch</h1>
          <button id="refreshBtn" class="icon-btn" aria-label="Refresh" title="Refresh">
            <svg class="lucide refresh-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 2v6h-6" />
              <path d="M3 12a9 9 0 0 1 15.3-6.3L21 8" />
              <path d="M3 22v-6h6" />
              <path d="M21 12a9 9 0 0 1-15.3 6.3L3 16" />
            </svg>
          </button>
        </div>
        <p><span id="activeCount">0</span> active commands</p>
      </header>

      <section>
        <div id="status" class="status"></div>
        <ul id="processList" class="process-list"></ul>
      </section>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
